<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a252f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="MyB Electronica">
    <title>MyB Electronica - Gestion local</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" href="logoMyB.png">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css?v=20260519-menu21">
</head>
<body>
<div class="contenedor">
    <div class="brand-header">
        <img src="logoMyB.png" alt="Logo MyB Electronica" class="brand-logo">
        <div class="brand-texto">
            <div class="brand-titulo">MyB Electronica</div>
            <div class="brand-subtitulo">Reparaciones</div>
        </div>
    </div>
    <div class="menu-principal" role="tablist" aria-label="Navegacion principal">
        <button type="button" class="menu-btn activo" id="menu-cobrar" role="tab" aria-selected="true" aria-controls="vista-cobrar">
            <span class="menu-btn-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M4 7h16v10H4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path>
                    <path d="M4 11h16" fill="none" stroke="currentColor" stroke-width="2"></path>
                </svg>
            </span>
            <span class="menu-btn-label">Cobrar</span>
        </button>
        <button type="button" class="menu-btn" id="menu-reparaciones" role="tab" aria-selected="false" aria-controls="vista-reparaciones">
            <span class="menu-btn-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M5 17l4.5-4.5L12 15l7-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    <path d="M5 5h14v14H5z" fill="none" stroke="currentColor" stroke-width="2"></path>
                </svg>
            </span>
            <span class="menu-btn-label">Reparaciones</span>
            <span class="menu-btn-badge" id="menu-badge-reparaciones">0</span>
        </button>
        <button type="button" class="menu-btn" id="menu-caja" role="tab" aria-selected="false" aria-controls="vista-caja">
            <span class="menu-btn-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M4 8h16v10H4z" fill="none" stroke="currentColor" stroke-width="2"></path>
                    <path d="M14 13h6" fill="none" stroke="currentColor" stroke-width="2"></path>
                </svg>
            </span>
            <span class="menu-btn-label">Caja</span>
        </button>
    </div>

    <section id="vista-cobrar" class="vista-app">
        <div class="panel-ingreso">
            <h3 class="titulo-seccion">Cobrar</h3>
            <div class="cobrar-bloque">
                <div class="cobrar-fila">
                    <div class="cobrar-campo">
                        <label for="venta-cantidad" class="cobrar-campo-label">Cantidad</label>
                        <input type="text" id="venta-cantidad" inputmode="numeric">
                    </div>
                    <div class="cobrar-campo">
                        <label for="venta-descripcion" class="cobrar-campo-label">Descripcion</label>
                        <div class="descripcion-wrap">
                            <input type="text" id="venta-descripcion">
                            <div id="lista-articulos" class="lista-articulos hidden"></div>
                        </div>
                    </div>
                    <div class="cobrar-campo">
                        <label for="venta-importe" class="cobrar-campo-label">Precio unitario</label>
                        <input type="text" id="venta-importe" inputmode="numeric">
                    </div>
                </div>
                <button type="button" class="btn-secundario-fijo" id="btn-agregar-item">+ AGREGAR ITEM</button>
                <div class="tabla-items-wrap">
                    <table class="tabla-items">
                        <thead>
                            <tr>
                                <th>Cantidad</th>
                                <th>Descripcion</th>
                                <th>Precio unitario</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-items-body"></tbody>
                    </table>
                </div>
                <div class="tabla-total-general">
                    <label for="venta-total-final" class="tabla-total-label">Total final:</label>
                    <span class="tabla-total-input-wrap">
                        <span>$</span>
                        <input type="text" id="venta-total-final" inputmode="numeric" value="0">
                    </span>
                </div>
                <button type="button" class="btn-guardar-fijo" id="btn-registrar-venta">+ REGISTRAR VENTA</button>
            </div>
        </div>
    </section>

    <section id="vista-reparaciones" class="vista-app hidden">
        <div class="panel-ingreso">
            <div class="fila-input">
                <input type="text" id="nombre" placeholder="Nombre del cliente">
                <input type="text" id="apellido" placeholder="Apellido del cliente">
            </div>
            <input type="text" id="telefono" placeholder="Numero de Telefono (Ej: 1122334455 sin 0 ni 15)">
            <div class="fila-input">
                <input type="text" id="marca" placeholder="Marca (Ej: Samsung, Motorola)">
                <input type="text" id="modelo" placeholder="Modelo (Ej: A54, Moto Edge)">
            </div>
            <input type="text" id="serie" placeholder="Numero de Serie / IMEI (Opcional)">
            <input type="text" id="falla" placeholder="Falla reportada / Sintomas iniciales">

            <button type="button" class="btn-flujo" id="btn-tomar-fotos">+ SACAR FOTO AL APARATO</button>
            <input type="file" id="fotoInput" accept="image/*" capture="environment" multiple style="display:none">
            <div id="vistaPreviaIngreso" class="galeria-fotos" style="display:none"></div>

            <button type="button" class="btn-guardar-fijo" id="btn-guardar">+ AGREGAR NUEVA ORDEN</button>
        </div>

        <h3>Ordenes de Trabajo</h3>

        <div class="pestanas">
            <button id="tab-aceptada" class="tab-btn activo">Aceptadas <span class="contador" id="cant-aceptada">0</span></button>
            <button id="tab-presupuesta" class="tab-btn">Presupuestadas <span class="contador" id="cant-presupuesto">0</span></button>
            <button id="tab-taller" class="tab-btn">En Taller <span class="contador" id="cant-taller">0</span></button>
            <button id="tab-terminada" class="tab-btn">Sacadas/Terminadas <span class="contador" id="cant-terminada">0</span></button>
            <button id="tab-archivada" class="tab-btn">Archivadas <span class="contador" id="cant-archivada">0</span></button>
        </div>

        <div class="buscador-row">
            <input id="buscar" placeholder="Buscar en la pestana actual (nombre, telefono u orden)" />
        </div>

        <div id="listaReparaciones"></div>

        <div class="respaldo-bar respaldo-bottom">
            <button class="btn-respaldo" id="btn-export">Exportar JSON</button>
            <button class="btn-respaldo" id="btn-import">Importar JSON</button>
            <input type="file" id="fileInput" style="display:none">
        </div>
    </section>

    <section id="vista-caja" class="vista-app hidden">
        <div class="caja-grid">
            <div class="caja-panel">
                <h3 class="titulo-seccion">Caja Negocio</h3>
                <p class="caja-total">Total: $<span id="total-caja-negocio">0</span></p>
                <div id="historial-caja-negocio" class="historial-caja"></div>
            </div>
            <div class="caja-panel">
                <h3 class="titulo-seccion">Caja Reparaciones</h3>
                <p class="caja-total">Total: $<span id="total-caja-reparaciones">0</span></p>
                <div id="historial-caja-reparaciones" class="historial-caja"></div>
            </div>
        </div>
    </section>

    <footer class="pie-credito">Hecho por militun para su papá, te amo</footer>
</div>

<div id="photoViewer" class="photo-viewer hidden">
    <button id="viewerClose" class="photo-viewer-close" aria-label="Cerrar visor">X</button>
    <button id="viewerPrev" class="photo-viewer-nav photo-viewer-prev" aria-label="Foto anterior">&lt;</button>
    <div class="photo-viewer-inner">
        <img id="viewerImage" src="" alt="Foto de reparacion" />
        <div class="photo-viewer-counter"><span id="viewerIndex">0</span> / <span id="viewerTotal">0</span></div>
    </div>
    <button id="viewerNext" class="photo-viewer-nav photo-viewer-next" aria-label="Foto siguiente">&gt;</button>
</div>

<script src="supabase-config.js?v=20260519-cloud3"></script>
<script type="module" src="app.js?v=20260519-menu26"></script>
</body>
</html>
