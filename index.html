<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyB Electronica - Gestion local</title>
    <link rel="stylesheet" href="styles.css?v=20260516-blob1">
</head>
<body>
<div class="contenedor">
    <h2>MyB Electronica - Gestion de Reparaciones</h2>

    <div class="respaldo-bar">
        <button class="btn-respaldo" id="btn-export">Exportar JSON</button>
        <button class="btn-respaldo" id="btn-import">Importar JSON</button>
        <input type="file" id="fileInput" style="display:none">
    </div>

    <div class="panel-ingreso">
        <div class="fila-input">
            <input type="text" id="nombre" placeholder="Nombre del cliente">
            <input type="text" id="apellido" placeholder="Apellido del cliente">
        </div>
        <input type="text" id="telefono" placeholder="Numero de Telefono (Ej: 1122334455 sin 0 ni 15)">
        <div class="fila-input">
            <input type="text" id="marca" placeholder="Marca (Ej: Samsung, Motorola)">
            <input type="text" id="modelo" placeholder="Modelo (Ej: A54, Moto Edge)">
        </div>
        <input type="text" id="serie" placeholder="Numero de Serie / IMEI (Opcional)">
        <input type="text" id="falla" placeholder="Falla reportada / Sintomas iniciales">

        <button type="button" class="btn-flujo" id="btn-tomar-fotos">SACAR FOTO AL APARATO (CAMARA EN VIVO)</button>
        <input type="file" id="fotoInput" accept="image/*" capture="environment" multiple style="display:none">
        <div id="vistaPreviaIngreso" class="galeria-fotos" style="display:none"></div>

        <button type="button" class="btn-guardar-fijo" id="btn-guardar">+ AGREGAR NUEVA ORDEN</button>
    </div>

    <h3>Ordenes de Trabajo</h3>

    <div class="pestanas">
        <button id="tab-aceptada" class="tab-btn activo">Aceptadas <span class="contador" id="cant-aceptada">0</span></button>
        <button id="tab-presupuesta" class="tab-btn">Presupuestadas <span class="contador" id="cant-presupuesto">0</span></button>
        <button id="tab-taller" class="tab-btn">En Taller <span class="contador" id="cant-taller">0</span></button>
        <button id="tab-terminada" class="tab-btn">Sacadas/Terminadas <span class="contador" id="cant-terminada">0</span></button>
        <button id="tab-archivada" class="tab-btn">Archivadas <span class="contador" id="cant-archivada">0</span></button>
    </div>

    <div class="buscador-row">
        <input id="buscar" placeholder="Buscar en la pestana actual (nombre, telefono u orden)" />
        <button id="btn-refrescar">Refrescar</button>
    </div>

    <div id="listaReparaciones"></div>
</div>

<div id="photoViewer" class="photo-viewer hidden">
    <button id="viewerClose" class="photo-viewer-close" aria-label="Cerrar visor">X</button>
    <button id="viewerPrev" class="photo-viewer-nav photo-viewer-prev" aria-label="Foto anterior">&lt;</button>
    <div class="photo-viewer-inner">
        <img id="viewerImage" src="" alt="Foto de reparacion" />
        <div class="photo-viewer-counter"><span id="viewerIndex">0</span> / <span id="viewerTotal">0</span></div>
    </div>
    <button id="viewerNext" class="photo-viewer-nav photo-viewer-next" aria-label="Foto siguiente">&gt;</button>
</div>

<script type="module" src="app.js?v=20260516-blob1"></script>
</body>
</html>
