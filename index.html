<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyB Electrónica - Gestión (Supabase)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="contenedor">
    <h2>MyB Electrónica - Gestión de Reparaciones (Cloud)</h2>

    <div class="respaldo-bar">
        <button class="btn-respaldo" id="btn-config">⚙️ Configurar Supabase</button>
        <button class="btn-respaldo" id="btn-export">📥 Exportar JSON</button>
        <button class="btn-respaldo" id="btn-import">📂 Importar JSON</button>
        <input type="file" id="fileInput" style="display:none">
    </div>

    <div class="panel-ingreso">
        <div class="fila-input">
            <input type="text" id="nombre" placeholder="Nombre del cliente">
            <input type="text" id="apellido" placeholder="Apellido del cliente">
        </div>
        <input type="text" id="telefono" placeholder="Número de Teléfono (Ej: 1122334455)">
        <div class="fila-input">
            <input type="text" id="marca" placeholder="Marca">
            <input type="text" id="modelo" placeholder="Modelo">
        </div>
        <input type="text" id="serie" placeholder="S/N o IMEI (Opcional)">
        <input type="text" id="falla" placeholder="Falla reportada">

        <button type="button" class="btn-flujo" id="btn-tomar-fotos">📷 Seleccionar Fotos (o usar cámara)</button>
        <input type="file" id="fotoInput" accept="image/*" capture="environment" multiple style="display:none">
        <div id="vistaPreviaIngreso" class="galeria-fotos" style="display:none"></div>

        <button type="button" class="btn-guardar-fijo" id="btn-guardar">➕ AGREGAR NUEVA ORDEN</button>
    </div>

    <div class="buscador-row">
        <input id="buscar" placeholder="Buscar por nombre, teléfono o orden..." />
        <select id="filtroEstado">
            <option value="">Todos</option>
            <option value="Aceptada">Aceptada</option>
            <option value="Presupuestada">Presupuestada</option>
            <option value="En Reparación">En Reparación</option>
            <option value="Terminada">Terminada</option>
            <option value="Archivada">Archivada</option>
        </select>
        <button id="btn-refrescar">🔄 Refrescar</button>
    </div>

    <h3>📋 Órdenes</h3>
    <div id="listaReparaciones"></div>
</div>

<!-- Config modal -->
<div id="configModal" class="modal">
    <div class="modal-content">
        <h3>Configuración Supabase</h3>
        <p>Ingresá tu `SUPABASE_URL` y `SUPABASE_ANON_KEY` (protegélas si es público).</p>
        <input id="cfg_url" placeholder="https://xxxx.supabase.co" />
        <input id="cfg_key" placeholder="ANON_KEY..." />
        <div style="display:flex; gap:8px; margin-top:8px;">
            <button id="saveCfg" class="btn-respaldo">Guardar</button>
            <button id="closeCfg" class="btn-respaldo">Cerrar</button>
        </div>
        <p style="font-size:12px; color:#666; margin-top:8px;">Nota: Para producción usar funciones server-side o env variables.</p>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
